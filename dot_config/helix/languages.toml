[[language]]
name = "latex"
scope = "source.tex"
injection-regex = "tex"
file-types = [ "tex", "sty", "cls", "Rd", "bbx", "cbx" ]
comment-token = "%"
roots = ["main.tex", "latexmkrc", ".git"]

language-servers = [
  "texlab",
  { name = "harper-ls-latex", only-features = ["diagnostics", "code-action"] },
  "wakatime",
]

indent = { tab-width = 4, unit = "\t" }
auto-format = true
formatter = { command = "tex-fmt", args = ["--stdin"] }

[[grammar]]
name = "latex"
source = { git = "https://github.com/latex-lsp/tree-sitter-latex", rev = "8c75e93cd08ccb7ce1ccab22c1fbd6360e3bcea6" }

[language-server.texlab.config.texlab.build]
onSave = true

[language-server.harper-ls-latex]
command = "harper-ls"
args = ["--stdio"]

[language-server.harper-ls-latex.config.harper-ls]
diagnosticSeverity = "hint"
dialect = "American"
# Optional: ignore generated/build output if those ever get opened as buffers.
excludePatterns = ["**/*.aux", "**/*.log", "**/*.out", "**/*.toc"]

[language-server.harper-ls-latex.config.harper-ls.linters]
# This is the one causing the soft-line-break false positives in LaTeX.
SentenceCapitalization = false

# You already wanted this off.
Spaces = false

# Keep useful low-noise checks on.
SpellCheck = true
RepeatedWords = true
AnA = true
UnclosedQuotes = true
LongSentences = true
CorrectNumberSuffix = true
