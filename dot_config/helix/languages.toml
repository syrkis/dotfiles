[language-server]
lean = { command = "lake", args = ["serve"] }
nu-lsp = { command = "nu", args = [ "--lsp" ] }
nixd = { command = "nixd"}
ty = { command = "ty", args = ["server"]}
ruff = { command = "ruff", args = ["server"] }

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]

[language-server.astro-ls]
command = "bun"
args = ["x", "astro-ls", "--stdio"]
config = { typescript = { tsdk = "./node_modules/typescript/lib" }, environment = "node" }

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.lsp-ai]
command = "lsp-ai"
args = ["--use-seperate-log-file"]



[language-server.lsp-ai.config.memory]
file_store = {}

[language-server.lsp-ai.config.models.model1]
type = "ollama"
model = "qwen2.5-coder:3b-base"

[language-server.lsp-ai.config.completion]
model = "model1"

[language-server.lsp-ai.config.completion.parameters]
max_context = 4000
max_tokens = 32

[language-server.lsp-ai.config.completion.parameters.options]
num_predict = 32
temperature = 0.1
keep_alive = "30m"
stop = ["<|endoftext|>", "<|fim_pad|>", "<|file_sep|>", "<|repo_name|>"]

[language-server.lsp-ai.config.completion.parameters.fim]
start  = "<|fim_prefix|>"
middle = "<|fim_suffix|>"
end    = "<|fim_middle|>"

[language-server.crosshair]
command = "crosshair"
args = ["server"]

[language-server.hyuga]
command = "hyuga"

[language-server.lua-language-server]
command = "lua-language-server"

[language-server.lua-language-server.config.Lua.hint]
enable = true
arrayIndex = "Enable"
setType = true
paramName = "All"
paramType = true
await = true

[language-server.astral-ty]
command = "ty"
args = ["server"]

[language-server.wakatime]
command = "wakatime-ls"

[[language]]
name = "python"
scope = "source.python"
comment-token = "#"
auto-format = true
roots = ["pyproject.toml", "setup.py", "poetry.lock", "pyrightconfig.json"]
language-servers = [ "ty", "ruff", "wakatime"] # , "lsp-ai" ]
# language-servers = [ "lsp-ai" ]

[[grammar]]
name = "python"
source = { git = "https://github.com/tree-sitter/tree-sitter-python", rev = "4bfdd9033a2225cc95032ce77066b7aeca9e2efc" }

[[grammar]]
name = "pie"
source = { git = "https://github.com/syrkis/tree-sitter-pie", rev = "cee9b08691457f6ddc3c1e50ef195b8df8272b65" }

[[language]]
name = "pie"
file-types = ["pie"]
scope = "source.pie"
comment-token = ";"

[language-server.uiua-lsp]
command = "uiua"
args = ["lsp"]

[[language]]
name = "uiua"
scope = "source.uiua"
injection-regex = "uiua"
file-types = ["ua"]
roots = []
auto-format = true
comment-token = "#"
language-servers = ["uiua-lsp", "wakatime"]
indent = {tab-width = 2, unit = " "}
auto-pairs = {'(' = ')', '{' = '}', '[' = ']', '"' = '"'}

[[grammar]]
name = "uiua"
source.git = "https://github.com/shnarazk/tree-sitter-uiua"
source.rev = "0da15357bc1179b187018131dc20c2395e77ce71"

[language-server.tinymist]
command = "tinymist"
config = { exportPdf = "onType", outputPath = "$dir/$name" }

[[language]]
name = "typst"
scope = "source.typst"
injection-regex = "typ(st)?"
file-types = ["typst", "typ"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = [ "tinymist", "harper-ls", "wakatime" ]
indent = { tab-width = 2, unit = "  " }
roots = ["notes.typ", ".git"]  # pick something that exists in your notes repo
formatter = { command = "typstyle", args = ["-c", "80", "--wrap-text"]}
auto-format = true

[[language]]
name = "hy"
file-types = ["hy"]
auto-format = true
formatter = { command = "beautifhy" }
language-servers = ["hyuga", "wakatime"]
comment-token = ";"
indent = {tab-width = 4, unit = " "}
# language-servers = ["uiua-lsp", "wakatime"]
# auto-pairs = {'(' = ')', '{' = '}', '[' = ']', '"' = '"'}

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'$' = '$'
'"' = '"'

[[grammar]]
name = "typst"
source = { git = "https://github.com/uben0/tree-sitter-typst", rev = "13863ddcbaa7b68ee6221cea2e3143415e64aea4" }

[[language]]
name = "julia"
scope = "source.julia"
injection-regex = "julia"
file-types = ["jl"]
formatter = { command = "julia", args = ["-m", "JuliaFormatter"] }
